name: 'Project Aurora - CI/CD Pipeline'

on:
  push:
    branches: ['main', 'dev', 'feature/**']
  pull_request:
    branches: ['main', 'dev']

permissions:
  id-token: write
  contents: read
  pull-requests: write
  checks: write

env:
  TERRAFORM_DIR: ./terraform
  TF_VERSION: 1.8.0
  TF_VAR_branch_name: ${{ github.head_ref || github.ref_name }}

jobs:
  # ============================================================================
  # Security & Code Quality Scan
  # ============================================================================
  security-scan:
    name: 'Security & Quality Scan'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 'Setup Terraform'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: 'Terraform Init'
        run: terraform init -backend=false
        working-directory: ${{ env.TERRAFORM_DIR }}

      - name: 'Terraform Format Check'
        run: terraform fmt -check -recursive
        working-directory: ${{ env.TERRAFORM_DIR }}

      - name: 'Terraform Validate'
        run: terraform validate
        working-directory: ${{ env.TERRAFORM_DIR }}

      - name: 'Checkov - IaC Security Scan'
        continue-on-error: true
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ env.TERRAFORM_DIR }}
          framework: terraform
          quiet: true
          skip_check: CKV_AZURE_4,CKV_AZURE_5,CKV_AZURE_6,CKV_AZURE_189,CKV_AZURE_160

      - name: 'Trivy - File System Scan'
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: 'HIGH,CRITICAL'

      - name: 'Upload Trivy Results to GitHub Security'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  # ============================================================================
  # Terraform Plan (Dev)
  # ============================================================================
  terraform-plan-dev:
    name: 'Terraform Plan (Dev)'
    runs-on: ubuntu-latest
    needs: [security-scan]
    environment: dev
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      TF_VAR_environment: dev
      TF_VAR_tenant_id: ${{ secrets.ARM_TENANT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: 'Setup Terraform'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: 'Azure Login'
        run: |
          az login --service-principal -u "$ARM_CLIENT_ID" -p "$ARM_CLIENT_SECRET" --tenant "$ARM_TENANT_ID" --output none 2>/dev/null || echo "Azure login skipped (no SP credentials)"

      - name: 'Create Terraform State Backend'
        continue-on-error: true
        run: |
          az group create --name Project-Aurora-tfstate --location "UK South" --output none 2>/dev/null || true
          az storage account create --name projectauroratfstate --resource-group Project-Aurora-tfstate --sku Standard_LRS --allow-blob-public-access false --output none 2>/dev/null || true
          az storage container create --name tfstate --account-name projectauroratfstate --output none 2>/dev/null || true

      - name: 'Terraform Init'
        run: terraform init
        working-directory: ${{ env.TERRAFORM_DIR }}

      - name: 'Terraform Plan'
        id: plan
        run: terraform plan -no-color -out=tfplan 2>&1 | tee plan-output.txt
        working-directory: ${{ env.TERRAFORM_DIR }}

      - name: 'Upload Terraform Plan'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev
          path: ${{ env.TERRAFORM_DIR }}/tfplan

      - name: 'Post Plan to PR'
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('${{ env.TERRAFORM_DIR }}/plan-output.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan (Dev)\n\`\`\`\n${output.substring(0, 65535)}\n\`\`\``
            });

  # ============================================================================
  # Terraform Apply (Dev)
  # ============================================================================
  terraform-apply-dev:
    name: 'Terraform Apply (Dev)'
    runs-on: ubuntu-latest
    needs: [terraform-plan-dev]
    if: github.ref_name == 'main' || github.ref_name == 'dev'
    environment: dev
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      TF_VAR_environment: dev
      TF_VAR_tenant_id: ${{ secrets.ARM_TENANT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: 'Setup Terraform'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: 'Azure Login'
        run: |
          az login --service-principal -u "$ARM_CLIENT_ID" -p "$ARM_CLIENT_SECRET" --tenant "$ARM_TENANT_ID" --output none 2>/dev/null || echo "Azure login skipped (no SP credentials)"

      - name: 'Create Terraform State Backend'
        continue-on-error: true
        run: |
          az group create --name Project-Aurora-tfstate --location "UK South" --output none 2>/dev/null || true
          az storage account create --name projectauroratfstate --resource-group Project-Aurora-tfstate --sku Standard_LRS --allow-blob-public-access false --output none 2>/dev/null || true
          az storage container create --name tfstate --account-name projectauroratfstate --output none 2>/dev/null || true

      - name: 'Terraform Init'
        run: terraform init
        working-directory: ${{ env.TERRAFORM_DIR }}

      - name: 'Download Terraform Plan'
        uses: actions/download-artifact@v4
        with:
          name: tfplan-dev
          path: ${{ env.TERRAFORM_DIR }}

      - name: 'Terraform Apply'
        run: terraform apply -auto-approve tfplan
        working-directory: ${{ env.TERRAFORM_DIR }}

      - name: 'Post Deployment Summary'
        run: |
          echo "## Project Aurora - Deployment Complete (Dev)" >> $GITHUB_STEP_SUMMARY
          echo "Environment: dev" >> $GITHUB_STEP_SUMMARY
          echo "Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # Staging Deployment (on push to main)
  # ============================================================================
  terraform-apply-staging:
    name: 'Terraform Apply (Staging)'
    runs-on: ubuntu-latest
    needs: [terraform-apply-dev]
    if: github.ref_name == 'main'
    environment: staging
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      TF_VAR_environment: staging
      TF_VAR_tenant_id: ${{ secrets.ARM_TENANT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: 'Setup Terraform'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: 'Azure Login'
        run: |
          az login --service-principal -u "$ARM_CLIENT_ID" -p "$ARM_CLIENT_SECRET" --tenant "$ARM_TENANT_ID" --output none 2>/dev/null || echo "Azure login skipped (no SP credentials)"

      - name: 'Create Terraform State Backend'
        continue-on-error: true
        run: |
          az group create --name Project-Aurora-tfstate --location "UK South" --output none 2>/dev/null || true
          az storage account create --name projectauroratfstate --resource-group Project-Aurora-tfstate --sku Standard_LRS --allow-blob-public-access false --output none 2>/dev/null || true
          az storage container create --name tfstate --account-name projectauroratfstate --output none 2>/dev/null || true

      - name: 'Terraform Init'
        run: terraform init -reconfigure
        working-directory: ${{ env.TERRAFORM_DIR }}

      - name: 'Terraform Plan'
        run: terraform plan -no-color -out=tfplan
        working-directory: ${{ env.TERRAFORM_DIR }}

      - name: 'Terraform Apply'
        run: terraform apply -auto-approve tfplan
        working-directory: ${{ env.TERRAFORM_DIR }}

  # ============================================================================
  # Production Deployment (manual approval required)
  # ============================================================================
  terraform-apply-prod:
    name: 'Terraform Apply (Production)'
    runs-on: ubuntu-latest
    needs: [terraform-apply-staging]
    if: github.ref_name == 'main'
    environment:
      name: production
      url: https://portal.azure.com
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID_PROD }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET_PROD }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID_PROD }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID_PROD }}
      TF_VAR_environment: prod
      TF_VAR_tenant_id: ${{ secrets.ARM_TENANT_ID_PROD }}

    steps:
      - uses: actions/checkout@v4

      - name: 'Setup Terraform'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: 'Azure Login'
        run: |
          az login --service-principal -u "$ARM_CLIENT_ID" -p "$ARM_CLIENT_SECRET" --tenant "$ARM_TENANT_ID" --output none 2>/dev/null || echo "Azure login skipped (no SP credentials)"

      - name: 'Create Terraform State Backend'
        continue-on-error: true
        run: |
          az group create --name Project-Aurora-tfstate --location "UK South" --output none 2>/dev/null || true
          az storage account create --name projectauroratfstate --resource-group Project-Aurora-tfstate --sku Standard_LRS --allow-blob-public-access false --output none 2>/dev/null || true
          az storage container create --name tfstate --account-name projectauroratfstate --output none 2>/dev/null || true

      - name: 'Terraform Init'
        run: terraform init -reconfigure
        working-directory: ${{ env.TERRAFORM_DIR }}

      - name: 'Terraform Plan'
        run: terraform plan -no-color -out=tfplan
        working-directory: ${{ env.TERRAFORM_DIR }}

      - name: 'Terraform Apply'
        run: terraform apply -auto-approve tfplan
        working-directory: ${{ env.TERRAFORM_DIR }}
